name: Lighthouse Performance

on:
  push:
    branches: 
      - develop
  workflow_dispatch:

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Write service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > /tmp/sa-key.json

      - name: Create empty .env.local for CI
        run: touch .env.local

      - name: Wait until deployment is ready
        run: |
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ secrets.LIGHTHOUSE_BASE_URL }})
            if [ "$STATUS" = "200" ]; then
              echo "Site is ready"
              exit 0
            fi
            echo "Waiting for deployment..."
            sleep 10
          done
          echo "Site did not become ready"
          exit 1
          
      - name: Run Lighthouse measurement
        run: npm run lighthouse
        env:
          LIGHTHOUSE_BASE_URL: ${{ secrets.LIGHTHOUSE_BASE_URL }}
          LIGHTHOUSE_TEST_USER_ID: ${{ secrets.LIGHTHOUSE_TEST_USER_ID }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
          PR_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PERF_TEST_GROUP_ID: ${{ secrets.PERF_TEST_GROUP_ID }}
          PERF_TEST_DINING_ID_AV: ${{ secrets.PERF_TEST_DINING_ID_AV }}
          PERF_TEST_DINING_ID_RV: ${{ secrets.PERF_TEST_DINING_ID_RV }}
          PERF_TEST_DINING_ID_CF: ${{ secrets.PERF_TEST_DINING_ID_CF }}
          PERF_TEST_LIGHTNING_ID_CHAT: ${{ secrets.PERF_TEST_LIGHTNING_ID_CHAT }}
          PERF_TEST_LIGHTNING_ID_DETAIL: ${{ secrets.PERF_TEST_LIGHTNING_ID_DETAIL }}
